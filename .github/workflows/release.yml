name: Release

on:
  push:
    tags:
      - "v*"

jobs:
  build:
    name: Build ${{ matrix.target }}
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - target: x86_64-linux
            binary: game_of_life
            archive: game_of_life-linux-x86_64.tar.gz
          - target: aarch64-linux
            binary: game_of_life
            archive: game_of_life-linux-aarch64.tar.gz
          - target: x86_64-macos
            binary: game_of_life
            archive: game_of_life-macos-x86_64.tar.gz
          - target: aarch64-macos
            binary: game_of_life
            archive: game_of_life-macos-aarch64.tar.gz
          - target: x86_64-windows
            binary: game_of_life.exe
            archive: game_of_life-windows-x86_64.zip

    steps:
      - uses: actions/checkout@v4

      - name: Install Zig
        uses: mlugg/setup-zig@v2
        with:
          version: "0.15.2"

      - name: Build
        run: zig build -Dtarget=${{ matrix.target }} -Doptimize=ReleaseFast

      - name: Package (Unix)
        if: matrix.target != 'x86_64-windows'
        run: tar czf ${{ matrix.archive }} -C zig-out/bin ${{ matrix.binary }}

      - name: Package (Windows)
        if: matrix.target == 'x86_64-windows'
        run: zip ${{ matrix.archive }} zig-out/bin/${{ matrix.binary }}

      - name: Upload to release
        uses: softprops/action-gh-release@v2
        with:
          files: ${{ matrix.archive }}
