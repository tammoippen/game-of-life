name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Tag to release (e.g. v1.0.0)"
        required: true

permissions:
  contents: write

jobs:
  build:
    name: Build ${{ matrix.target }}
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - target: x86_64-linux
            binary: game_of_life
            archive: game_of_life-linux-x86_64.tar.gz
          - target: aarch64-linux
            binary: game_of_life
            archive: game_of_life-linux-aarch64.tar.gz
          - target: x86_64-macos
            binary: game_of_life
            archive: game_of_life-macos-x86_64.tar.gz
          - target: aarch64-macos
            binary: game_of_life
            archive: game_of_life-macos-aarch64.tar.gz
          - target: x86_64-windows
            binary: game_of_life.exe
            archive: game_of_life-windows-x86_64.zip

    steps:
      - uses: actions/checkout@v6
      - uses: mlugg/setup-zig@v2
        with:
          version: "0.15.2"

      - run: zig build -Dtarget=${{ matrix.target }} -Doptimize=ReleaseFast

      - name: Package (Unix)
        if: matrix.target != 'x86_64-windows'
        run: tar czf ${{ matrix.archive }} -C zig-out/bin ${{ matrix.binary }}

      - name: Package (Windows)
        if: matrix.target == 'x86_64-windows'
        run: zip ${{ matrix.archive }} zig-out/bin/${{ matrix.binary }}

      - name: Upload to release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ inputs.tag || github.ref_name }}
          files: ${{ matrix.archive }}
